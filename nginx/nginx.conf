events {
    worker_connections 1024;
}

http {
    # Upstream para svc-rooms
    upstream svc_rooms {
        server svc-rooms:8081;
    }

    # Upstream para svc-reservations
    upstream svc_reservations {
        server svc-reservations:8082;
    }

    server {
        listen 80;
        server_name localhost;

        # Rutas para svc-rooms
        location /api/v1/rooms {
            proxy_pass http://svc_rooms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Rutas para svc-reservations
        location /api/v1/reservations {
            proxy_pass http://svc_reservations;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            return 200 "Hotel Reservations API Gateway is running";
            add_header Content-Type text/plain;
        }
    }
}
